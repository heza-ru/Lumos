<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Extended Toolbar</title>
    <style>
      :root {
        --toolbar-window-margin: 10px;
        --pill-bg:     rgba(18, 18, 18, 0.84);
        --pill-border: rgba(255, 255, 255, 0.18);
        --pill-icon:   rgba(255, 255, 255, 0.65);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button { background: none; border: none; padding: 0; cursor: pointer; }
      button:focus { outline: none; }
      button svg   { pointer-events: none; }

      .toolbar__pill     { -webkit-app-region: drag; }
      .toolbar__close,
      .toolbar__draw-btn { -webkit-app-region: no-drag; }

      .toolbar-extended {
        position: absolute;
        top: var(--toolbar-window-margin);
        left: var(--toolbar-window-margin);
      }

      /* ── Glass pill ── */
      .toolbar__pill {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        padding: 6px 8px;
        border-radius: 100px;
        background: var(--pill-bg);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid var(--pill-border);
        box-shadow:
          0 8px 32px rgba(0,0,0,0.45),
          inset 0 1px 0 rgba(255,255,255,0.12);
        position: relative;
        user-select: none;
        -webkit-user-select: none;
      }

      /* Top dome specular */
      .toolbar__pill::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 100px;
        background: radial-gradient(ellipse 70% 40% at 50% 0%,
          rgba(255,255,255,0.12) 0%, transparent 70%);
        pointer-events: none;
      }

      /* Drag dots */
      .toolbar__draglines {
        display: flex;
        padding: 0 4px;
        align-items: center;
      }
      .draglines {
        display: grid;
        row-gap: 2px; column-gap: 2px;
        grid-template-columns: repeat(2, min-content);
      }
      .draglines div {
        width: 2px; height: 2px;
        border-radius: 50%;
        background-color: rgba(255,255,255,0.3);
      }

      /* Draw mode button */
      .toolbar__draw-btn {
        width: 36px; height: 36px;
        border-radius: 100px;
        display: flex; align-items: center; justify-content: center;
        color: var(--pill-icon);
        transition: background 0.12s, color 0.12s,
          transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
      }
      .toolbar__draw-btn:hover {
        background: rgba(255,255,255,0.12);
        color: #fff;
        transform: scale(1.08);
      }
      .toolbar__draw-btn svg { width: 20px; height: 20px; }

      /* Close X — visible on hover */
      .toolbar__close {
        position: absolute;
        top: -4px; left: -4px;
        z-index: 1;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: rgba(25,25,25,0.9);
        border: 1px solid rgba(255,255,255,0.2);
        display: flex; align-items: center; justify-content: center;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .toolbar-extended:hover .toolbar__close { opacity: 1; }
      .toolbar__close button {
        display: flex; align-items: center; justify-content: center;
      }
      .toolbar__close svg { width: 9px; height: 9px; color: rgba(255,255,255,0.7); }
    </style>
  </head>

  <body>
    <aside id="toolbar" class="toolbar-extended">

      <div class="toolbar__pill">
        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div><div></div>
            <div></div><div></div>
            <div></div><div></div>
          </div>
        </div>

        <button class="toolbar__draw-btn" tabindex="-1" title="Draw Mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/>
          </svg>
        </button>

        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div><div></div>
            <div></div><div></div>
            <div></div><div></div>
          </div>
        </div>
      </div>

      <div class="toolbar__close">
        <button tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>

    </aside>
  </body>
</html>
